services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3000
      - DB_PATH=/app/data/todos.db
    volumes:
      - todo-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

volumes:
  todo-data:
