services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/app/data/todos.db
    volumes:
      - todo-data:/app/data
    networks:
      - todo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  todo-data:

networks:
  todo-network:
    driver: bridge
